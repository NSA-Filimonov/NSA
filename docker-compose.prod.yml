services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: nsa-backend-v11-api:latest
    environment:
      APP_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 20
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
  tests:
    image: nsa-backend-v11-api:latest
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      API_URL: http://nginx
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      nginx:
        condition: service_started
    command: ["python", "-m", "pytest", "-q", "-p", "no:cacheprovider", "-m", "integration", "tests/integration"]
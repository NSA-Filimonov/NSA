name: CI Integration
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show Docker versions
        run: |
          docker --version
          docker compose version
      - name: Build and start stack
        run: docker compose -f docker-compose.prod.yml up -d --build
      - name: Run integration tests (JUnit)
        run: |
          mkdir -p test-results
          docker compose -f docker-compose.prod.yml run --rm tests
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration-report
          path: test-results/junit.xml
          if-no-files-found: error
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.prod.yml logs --no-color
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v --remove-orphans